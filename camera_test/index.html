<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Camera Test</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#111; color:#fff; font-family:monospace; height:100vh; }
    #status {
      position:absolute; top:50%; left:50%;
      transform:translate(-50%,-50%);
      text-align:center; font-size:14px; letter-spacing:2px; color:#666;
    }
    #camBox {
      position:fixed; bottom:16px; right:16px;
      width:240px; height:180px;
      background:#000; border:1px solid #333; overflow:hidden;
    }
    #camBox video { width:100%; height:100%; object-fit:cover; transform:scaleX(-1); }
    #camLabel {
      position:absolute; bottom:0; left:0; right:0;
      background:rgba(0,0,0,0.6); padding:3px 6px;
      font-size:10px; color:#555; letter-spacing:1px;
    }
    #retryBtn {
      display:none; margin-top:16px;
      background:transparent; border:1px solid #444;
      color:#888; padding:6px 16px; font-family:monospace;
      letter-spacing:2px; cursor:pointer; font-size:11px;
    }
    #retryBtn:hover { border-color:#fff; color:#fff; }
  </style>
</head>
<body>
  <div id="status">
    <div id="statusText">REQUESTING CAMERA...</div>
    <button id="retryBtn" onclick="startCamera()">RETRY</button>
  </div>

  <div id="camBox">
    <video id="vid" autoplay playsinline muted></video>
    <div id="camLabel">CAM // LIVE</div>
  </div>

  <script>
    const vid        = document.getElementById('vid');
    const statusText = document.getElementById('statusText');
    const retryBtn   = document.getElementById('retryBtn');

    async function startCamera() {
      retryBtn.style.display = 'none';
      statusText.textContent = 'REQUESTING CAMERA...';
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: true });
        vid.srcObject = stream;
        vid.play();
        statusText.textContent = 'CAMERA LIVE';
      } catch(e) {
        statusText.textContent = 'CAMERA DENIED — ' + e.message;
        retryBtn.style.display = 'inline-block';
        console.error(e);
      }
    }

    startCamera();
  </script>
</body>
</html>
