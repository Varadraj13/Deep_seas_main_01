<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pre-Phase 1: HTML Malacca Remnant Check</title>
  <style>
    body { background: #0a0a0a; color: #ccc; font-family: monospace; padding: 24px; }
    h1 { color: #fff; font-size: 14px; letter-spacing: 2px; margin-bottom: 24px; }
    .result { padding: 6px 0; border-bottom: 1px solid #111; font-size: 12px; }
    .pass { color: #4ade80; }
    .fail { color: #ef4444; }
    .summary { margin-top: 20px; font-size: 13px; font-weight: bold; }
  </style>
</head>
<body>
  <h1>PRE-PHASE 01 — HTML MALACCA REMNANT CHECK</h1>
  <div id="results"></div>
  <div id="summary" class="summary"></div>

  <script>
    const out = document.getElementById('results');
    let passed = 0, failed = 0;

    function test(desc, fn) {
      return fn().then(() => {
        out.innerHTML += `<div class="result pass">PASS  ${desc}</div>`;
        passed++;
      }).catch(e => {
        out.innerHTML += `<div class="result fail">FAIL  ${desc}<br>&nbsp;&nbsp;&nbsp;&nbsp;-> ${e.message}</div>`;
        failed++;
      });
    }

    function assert(cond, msg) {
      if (!cond) throw new Error(msg || 'assertion failed');
    }

    async function fetchHTML(path) {
      const resp = await fetch(path);
      return resp.text();
    }

    async function runAll() {
      // Slice 1: market_screen.html contains no "MALACCA" text
      await test('market_screen.html contains no "MALACCA" string', async () => {
        const html = await fetchHTML('../market_screen.html');
        const match = html.match(/MALACCA/gi);
        assert(!match, `found ${match.length} occurrence(s) of "MALACCA" in market_screen.html`);
      });

      // Slice 2: detector.html contains no "MALACCA" text
      await test('detector.html contains no "MALACCA" string', async () => {
        const html = await fetchHTML('../detector.html');
        const match = html.match(/MALACCA/gi);
        assert(!match, `found ${match.length} occurrence(s) of "MALACCA" in detector.html`);
      });

      // Summary
      const total = passed + failed;
      const color = failed === 0 ? '#4ade80' : '#ef4444';
      document.getElementById('summary').innerHTML =
        `<span style="color:${color}">${passed}/${total} passed</span>` +
        (failed ? ` -- ${failed} failing` : ' -- all green');
    }

    runAll();
  </script>
</body>
</html>
