<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pre-Phase 1: Recentering Tests</title>
  <style>
    body { background: #0a0a0a; color: #ccc; font-family: monospace; padding: 24px; }
    h1 { color: #fff; font-size: 14px; letter-spacing: 2px; margin-bottom: 24px; }
    .result { padding: 6px 0; border-bottom: 1px solid #111; font-size: 12px; }
    .pass { color: #4ade80; }
    .fail { color: #ef4444; }
    .summary { margin-top: 20px; font-size: 13px; font-weight: bold; }
  </style>
</head>
<body>
  <h1>PRE-PHASE 01 — RECENTERING: MALACCA → HORMUZ</h1>
  <div id="results"></div>
  <div id="summary" class="summary"></div>

  <!-- config-data.js is self-contained (no DOM, no Leaflet) -->
  <script src="../js/config-data.js"></script>
  <script>
    const out = document.getElementById('results');
    let passed = 0, failed = 0;

    function test(desc, fn) {
      try {
        fn();
        out.innerHTML += `<div class="result pass">PASS  ${desc}</div>`;
        passed++;
      } catch (e) {
        out.innerHTML += `<div class="result fail">FAIL  ${desc}<br>&nbsp;&nbsp;&nbsp;&nbsp;→ ${e.message}</div>`;
        failed++;
      }
    }

    function assert(cond, msg) {
      if (!cond) throw new Error(msg || 'assertion failed');
    }

    // ── Behaviors ──────────────────────────────────────────────────

    test('ROUTES has exactly 12 routes (6 inbound + 6 outbound)', () => {
      assert(ROUTES.length === 12, `expected 12, got ${ROUTES.length}`);
    });

    test('all route coordinates are in Hormuz lat range (22–28°N)', () => {
      const bad = [];
      ROUTES.forEach((route, ri) => {
        route.forEach(([lat, lng], pi) => {
          if (lat < 22 || lat > 28) bad.push(`route[${ri}][${pi}] lat=${lat.toFixed(2)}`);
        });
      });
      assert(bad.length === 0, `out-of-range coords: ${bad.slice(0, 3).join(', ')}`);
    });

    test('all route coordinates are in Hormuz lng range (54–62°E)', () => {
      const bad = [];
      ROUTES.forEach((route, ri) => {
        route.forEach(([lat, lng], pi) => {
          if (lng < 54 || lng > 62) bad.push(`route[${ri}][${pi}] lng=${lng.toFixed(2)}`);
        });
      });
      assert(bad.length === 0, `out-of-range coords: ${bad.slice(0, 3).join(', ')}`);
    });

    test('even-indexed routes (inbound) flow westward — lng decreases start→end', () => {
      const bad = [];
      for (let i = 0; i < ROUTES.length; i += 2) {
        const r = ROUTES[i];
        if (r[0][1] <= r[r.length - 1][1])
          bad.push(`route[${i}] starts at lng=${r[0][1].toFixed(2)}, ends at lng=${r[r.length-1][1].toFixed(2)}`);
      }
      assert(bad.length === 0, bad[0]);
    });

    test('odd-indexed routes (outbound) flow eastward — lng increases start→end', () => {
      const bad = [];
      for (let i = 1; i < ROUTES.length; i += 2) {
        const r = ROUTES[i];
        if (r[0][1] >= r[r.length - 1][1])
          bad.push(`route[${i}] starts at lng=${r[0][1].toFixed(2)}, ends at lng=${r[r.length-1][1].toFixed(2)}`);
      }
      assert(bad.length === 0, bad[0]);
    });

    test('WAYPOINT_NAMES contains Hormuz-specific terms', () => {
      const hormuzTerms = ['Hormuz', 'Persian Gulf', 'Gulf of Oman', 'Musandam', 'Qeshm', 'Bandar Abbas'];
      const found = hormuzTerms.some(t => WAYPOINT_NAMES.some(w => w.includes(t)));
      assert(found, `none of ${hormuzTerms.join(', ')} found in WAYPOINT_NAMES`);
    });

    test('DESTINATIONS contains at least one Gulf port', () => {
      const gulfPorts = ['Jebel Ali', 'Abu Dhabi', 'Bandar Abbas', 'Kuwait', 'Muscat', 'Doha', 'Khor Fakkan'];
      const found = gulfPorts.some(p => DESTINATIONS.includes(p));
      assert(found, `none of ${gulfPorts.join(', ')} found in DESTINATIONS`);
    });

    test('WAYPOINT_NAMES contains no Malacca-specific terms', () => {
      const malaccaTerms = ['Malacca', 'Singapore Strait', 'Philip Channel', 'Raffles', 'Klang', 'Horsburgh'];
      const found = malaccaTerms.find(t => WAYPOINT_NAMES.some(w => w.includes(t)));
      assert(!found, `Malacca term still present: "${found}"`);
    });

    // ── Summary ────────────────────────────────────────────────────
    const total = passed + failed;
    const color = failed === 0 ? '#4ade80' : '#ef4444';
    document.getElementById('summary').innerHTML =
      `<span style="color:${color}">${passed}/${total} passed</span>` +
      (failed ? ` — ${failed} failing` : ' — all green');
  </script>
</body>
</html>
