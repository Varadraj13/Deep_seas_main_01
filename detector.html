<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tactical Detection — Deep Seas</title>
<!-- Pin to the exact versions Teachable Machine was built and tested with.
     @teachablemachine/image@0.8.5 peer-requires tfjs@1.3.1; loading tfjs@4.x
     causes silent incompatibility (API surface changed across major versions). -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8.5/dist/teachablemachine-image.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: Helvetica, Arial, sans-serif;
  background: #080808;
  color: #888888;
  height: 100vh;
  overflow: hidden;
  user-select: none;
}

/* ===== BACK NAV ===== */
#backNav {
  position: fixed; top: 12px; left: 12px; z-index: 100;
}
#backNav a {
  display: inline-block;
  background: transparent; border: 1px solid #222222;
  color: #666666; padding: 4px 12px;
  font-size: 9px; letter-spacing: 2px; text-transform: uppercase;
  text-decoration: none; transition: all 0.15s;
  font-family: Helvetica, Arial, sans-serif;
}
#backNav a:hover { border-color: #cc0000; color: #ffffff; }

/* ===== CENTER ACTION DISPLAY ===== */
#actionDisplay {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 480px;
  background: #f8f8f8;
  border: 1px solid #dddddd;
  padding: 48px 40px;
  text-align: center;
  transition: border-color 0.2s, box-shadow 0.2s;
}
#actionDisplay.triggered-a {
  border-color: #cc0000;
  box-shadow: 0 0 40px rgba(204,0,0,0.18);
  animation: flashA 0.35s ease-out;
}
#actionDisplay.triggered-b {
  border-color: #3b82f6;
  box-shadow: 0 0 40px rgba(59,130,246,0.18);
  animation: flashB 0.35s ease-out;
}
@keyframes flashA {
  0%   { background: rgba(204,0,0,0.12); }
  100% { background: #f8f8f8; }
}
@keyframes flashB {
  0%   { background: rgba(59,130,246,0.12); }
  100% { background: #f8f8f8; }
}

#adState {
  font-size: 9px; letter-spacing: 4px; text-transform: uppercase;
  color: #aaaaaa; margin-bottom: 24px;
}
#adPlayer {
  font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
  margin-bottom: 4px;
}
#adRole {
  font-size: 9px; letter-spacing: 4px; text-transform: uppercase;
  color: #aaaaaa; margin-bottom: 20px;
}
#adAction {
  font-size: 38px; font-weight: 400; letter-spacing: 5px;
  text-transform: uppercase; line-height: 1.1;
  color: #111111;
}
#adConfidence {
  font-size: 9px; letter-spacing: 2px; text-transform: uppercase;
  color: #aaaaaa; margin-top: 18px;
}

/* scanning dot pulse */
@keyframes scanPulse { 0%,100%{opacity:0.3} 50%{opacity:1} }
#scanDot {
  display: inline-block; width: 5px; height: 5px;
  border-radius: 0; background: #aaaaaa; margin-left: 6px;
  vertical-align: middle; animation: scanPulse 1.2s ease-in-out infinite;
}

/* ===== TECH PANEL (top right) ===== */
#techPanel {
  position: fixed; top: 12px; right: 12px; z-index: 100;
  width: 268px;
  background: #0a0a0a; border: 1px solid #1a1a1a;
  padding: 12px 14px;
  font-size: 10px; font-family: Helvetica, Arial, sans-serif;
  max-height: calc(100vh - 200px); overflow-y: auto;
  scrollbar-width: thin; scrollbar-color: #222222 transparent;
}
#techPanel::-webkit-scrollbar { width: 3px; }
#techPanel::-webkit-scrollbar-thumb { background: #222222; }

.tp-title {
  font-size: 8px; color: #cc0000; letter-spacing: 3px;
  text-transform: uppercase; font-weight: 400;
  margin-bottom: 10px;
}
.tp-row {
  display: flex; justify-content: space-between;
  align-items: baseline; padding: 2px 0;
  border-bottom: 1px solid #111111;
}
.tp-label { font-size: 8px; color: #444444; text-transform: uppercase; letter-spacing: 2px; }
.tp-value { font-size: 10px; color: #ffffff; font-family: Helvetica, Arial, sans-serif; }
.tp-value.ready  { color: #22c55e; }
.tp-value.loading { color: #f59e0b; }
.tp-value.error  { color: #cc0000; }

.tp-divider {
  border: none; border-top: 1px solid #1a1a1a;
  margin: 8px 0;
}

.tp-bar-row {
  margin-bottom: 4px;
}
.tp-bar-label {
  font-size: 7px; color: #555555; text-transform: uppercase;
  letter-spacing: 1px; margin-bottom: 2px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.tp-bar-label.top-class { color: #cc0000; }
.tp-bar-track {
  display: flex; align-items: center; gap: 6px;
}
.tp-bar-bg {
  flex: 1; height: 2px; background: #1a1a1a; position: relative;
}
.tp-bar-fill {
  height: 100%; background: #cc0000;
  transition: width 0.15s ease-out;
  min-width: 0;
}
.tp-bar-fill.player-b { background: #3b82f6; }
.tp-bar-fill.bg-class  { background: #333333; }
.tp-bar-pct {
  font-size: 8px; color: #555555; min-width: 30px;
  text-align: right; font-family: Helvetica, Arial, sans-serif;
}
.tp-bar-pct.high { color: #ffffff; }

/* ===== CAMERA PREVIEW (bottom right) ===== */
#cameraWrap {
  position: fixed; bottom: 12px; right: 12px; z-index: 100;
  width: 240px; height: 180px;
  background: #0a0a0a; border: 1px solid #1a1a1a;
  overflow: hidden;
}
#cameraWrap video {
  width: 100%; height: 100%; object-fit: cover;
  transform: scaleX(-1); /* mirror */
  display: block;
}
#camLabel {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: rgba(8,8,8,0.75); padding: 3px 6px;
  font-size: 7px; color: #444444;
  letter-spacing: 2px; text-transform: uppercase;
}
#camStatus {
  position: absolute; top: 6px; left: 6px;
  font-size: 7px; color: #cc0000; letter-spacing: 2px;
  text-transform: uppercase;
}

/* ===== RETRY BUTTON (shown only on camera/model error) ===== */
#retryBtn {
  display: none;
  position: fixed; bottom: 202px; right: 12px; z-index: 101;
  width: 240px;
  background: transparent; border: 1px solid #222222;
  color: #666666; padding: 7px 0;
  font-size: 9px; letter-spacing: 2px; text-transform: uppercase;
  cursor: pointer; font-family: Helvetica, Arial, sans-serif;
  transition: all 0.15s;
}
#retryBtn:hover { border-color: #cc0000; color: #ffffff; }

/* ===== STATUS BAR ===== */
#statusBar {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 99;
  background: #080808; border-top: 1px solid #1a1a1a;
  padding: 4px 16px; font-size: 8px; color: #444444;
  letter-spacing: 2px; text-transform: uppercase;
  display: flex; gap: 16px;
  font-family: Helvetica, Arial, sans-serif;
}
</style>
</head>
<body>

<!-- Back navigation -->
<div id="backNav">
  <a href="index.html">← MALACCA SIM</a>
</div>

<!-- Center action display -->
<div id="actionDisplay">
  <div id="adState">INITIALIZING DETECTION SYSTEM<span id="scanDot"></span></div>
  <div id="adPlayer" style="display:none"></div>
  <div id="adRole"   style="display:none"></div>
  <div id="adAction" style="display:none"></div>
  <div id="adConfidence" style="display:none"></div>
</div>

<!-- Tech panel (top right) -->
<div id="techPanel">
  <div class="tp-title">DETECTION SYSTEM</div>

  <div class="tp-row">
    <span class="tp-label">Model</span>
    <span class="tp-value loading" id="tpModel">LOADING</span>
  </div>
  <div class="tp-row">
    <span class="tp-label">Camera</span>
    <span class="tp-value loading" id="tpCamera">OFFLINE</span>
  </div>
  <div class="tp-row">
    <span class="tp-label">FPS</span>
    <span class="tp-value" id="tpFPS">—</span>
  </div>
  <div class="tp-row">
    <span class="tp-label">Frames</span>
    <span class="tp-value" id="tpFrames">0</span>
  </div>

  <hr class="tp-divider">

  <div class="tp-row" style="margin-bottom:6px">
    <span class="tp-label">Top Class</span>
    <span class="tp-value" id="tpTopClass" style="font-size:8px;max-width:140px;text-align:right;line-height:1.3">—</span>
  </div>
  <div class="tp-row">
    <span class="tp-label">Confidence</span>
    <span class="tp-value" id="tpConf">—</span>
  </div>
  <div class="tp-row">
    <span class="tp-label">Threshold</span>
    <span class="tp-value" style="color:#444444">70%</span>
  </div>

  <hr class="tp-divider">

  <div class="tp-label" style="margin-bottom:6px">CLASS PROBABILITIES</div>
  <div id="tpBars">
    <!-- populated by JS -->
  </div>
</div>

<!-- Camera preview (bottom right) -->
<div id="cameraWrap">
  <video id="webcam" autoplay playsinline muted></video>
  <div id="camStatus">● OFFLINE</div>
  <div id="camLabel">TACTICAL CAM // CH-01</div>
</div>

<!-- Retry button — hidden until camera or model error -->
<button id="retryBtn">RETRY CAMERA</button>

<!-- Status bar -->
<div id="statusBar">
  <span id="sbModel">MODEL: LOADING</span>
  <span>//</span>
  <span id="sbPlayer">PLAYER: —</span>
  <span>//</span>
  <span id="sbAction">ACTION: STANDBY</span>
  <span>//</span>
  <span id="sbFPS">0 FPS</span>
</div>

<script>
// ================================================================
//  CONFIG
// ================================================================
const MODEL_URL = 'https://teachablemachine.withgoogle.com/models/pB5PYX0fJ/';
const CONFIDENCE_THRESHOLD = 0.70;

// Keys must match the model's exact class labels (from metadata.json).
// The arrow character is U+2192. If your model uses a different char, open
// the browser console and check the className values logged on first frame.
const LABEL_MAP = {
  'Green cushion → Block Strait':      { player: 'A', role: 'DISRUPTOR', action: 'BLOCK STRAIT',  color: '#cc0000', barClass: '' },
  'Red drill/tool → Seize Tanker':     { player: 'A', role: 'DISRUPTOR', action: 'SEIZE TANKER',  color: '#cc0000', barClass: '' },
  'Wooden stool → Dark Ops':           { player: 'A', role: 'DISRUPTOR', action: 'DARK OPS',      color: '#cc0000', barClass: '' },
  'Cardboard box → Convoy':            { player: 'B', role: 'DEFENDER',  action: 'CONVOY',        color: '#3b82f6', barClass: 'player-b' },
  'Black office chair → Sprint':       { player: 'B', role: 'DEFENDER',  action: 'SPRINT',        color: '#3b82f6', barClass: 'player-b' },
  'Black standing desk → Secure Port': { player: 'B', role: 'DEFENDER',  action: 'SECURE PORT',   color: '#3b82f6', barClass: 'player-b' },
  'Background': null,
};

// ================================================================
//  STATE
// ================================================================
let model        = null;
let predCanvas   = null;  // 224×224 canvas fed to model.predict()
let predCtx      = null;
let running      = false;
let frameCount   = 0;
let lastFrameTime = performance.now();
let fpsSmoothed  = 0;
let currentAction = '__init__'; // non-null sentinel so first background frame shows SCANNING
let barEls       = {};    // label → { fill, pct, lbl } DOM nodes (no IDs used)

const webcamEl  = document.getElementById('webcam');
const adState   = document.getElementById('adState');
const adPlayer  = document.getElementById('adPlayer');
const adRole    = document.getElementById('adRole');
const adAction  = document.getElementById('adAction');
const adConf    = document.getElementById('adConfidence');
const adDisplay = document.getElementById('actionDisplay');
const retryBtn  = document.getElementById('retryBtn');

// ================================================================
//  MODEL LOAD → auto-starts camera on success
// ================================================================
async function loadModel() {
  try {
    model = await tmImage.load(MODEL_URL + 'model.json', MODEL_URL + 'metadata.json');
    document.getElementById('tpModel').textContent = 'READY';
    document.getElementById('tpModel').className = 'tp-value ready';
    document.getElementById('sbModel').textContent = 'MODEL: READY';
    console.log('[Detection] Model loaded, classes:', model.getTotalClasses());
    startCamera(); // auto-start — no button needed
  } catch(e) {
    document.getElementById('tpModel').textContent = 'ERROR';
    document.getElementById('tpModel').className = 'tp-value error';
    setAdState('MODEL LOAD FAILED — CHECK CONSOLE');
    retryBtn.textContent = 'RETRY MODEL';
    retryBtn.style.display = 'block';
    retryBtn.onclick = () => { retryBtn.style.display = 'none'; loadModel(); };
    console.error('[Detection] Model load error:', e);
  }
}

// Build bar rows using direct DOM node refs — no element IDs with special chars.
// Called after first prediction so we use the real class names from the model.
function buildBars(predictions) {
  const container = document.getElementById('tpBars');
  container.innerHTML = '';
  barEls = {};
  predictions.forEach(p => {
    const label = p.className;
    const map   = LABEL_MAP[label];
    const barClass = map ? map.barClass : 'bg-class';

    const lblEl  = document.createElement('div');
    lblEl.className = 'tp-bar-label';
    lblEl.textContent = label.replace(' → ', ' // ');

    const fillEl = document.createElement('div');
    fillEl.className = 'tp-bar-fill' + (barClass ? ' ' + barClass : '');
    fillEl.style.width = '0%';

    const pctEl  = document.createElement('div');
    pctEl.className = 'tp-bar-pct';
    pctEl.textContent = '0%';

    const bgEl   = document.createElement('div');
    bgEl.className = 'tp-bar-bg';
    bgEl.appendChild(fillEl);

    const trackEl = document.createElement('div');
    trackEl.className = 'tp-bar-track';
    trackEl.appendChild(bgEl);
    trackEl.appendChild(pctEl);

    const rowEl  = document.createElement('div');
    rowEl.className = 'tp-bar-row';
    rowEl.appendChild(lblEl);
    rowEl.appendChild(trackEl);
    container.appendChild(rowEl);

    barEls[label] = { fill: fillEl, pct: pctEl, lbl: lblEl };
  });
  // Log actual class names once so the user can verify against LABEL_MAP
  console.log('[Detection] Model class names:', predictions.map(p => p.className));
}

// ================================================================
//  CAMERA START (called automatically after model loads)
// ================================================================
async function startCamera() {
  setAdState('STARTING CAMERA');
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: true });
    webcamEl.srcObject = stream;

    await new Promise(resolve => {
      if (webcamEl.readyState >= 2) { resolve(); return; }
      webcamEl.addEventListener('loadeddata', resolve, { once: true });
    });
    webcamEl.play();

    predCanvas = document.createElement('canvas');
    predCanvas.width  = 224;
    predCanvas.height = 224;
    predCtx = predCanvas.getContext('2d');

    document.getElementById('tpCamera').textContent = 'ACTIVE';
    document.getElementById('tpCamera').className   = 'tp-value ready';
    document.getElementById('camStatus').textContent = '● LIVE';
    document.getElementById('camStatus').style.color = '#22c55e';

    running = true;
    lastFrameTime = performance.now();
    requestAnimationFrame(loop);

  } catch(e) {
    document.getElementById('tpCamera').textContent = 'DENIED';
    document.getElementById('tpCamera').className   = 'tp-value error';
    setAdState('CAMERA DENIED — ALLOW ACCESS THEN RETRY');
    retryBtn.textContent = 'RETRY CAMERA';
    retryBtn.style.display = 'block';
    retryBtn.onclick = () => { retryBtn.style.display = 'none'; startCamera(); };
    console.error('[Detection] Camera error:', e);
  }
}

// ================================================================
//  PREDICTION LOOP
// ================================================================
let barsBuilt = false;

async function loop() {
  if (!running) return;
  requestAnimationFrame(loop);

  // Draw current video frame to prediction canvas (224×224)
  if (webcamEl.readyState < 2) return;
  predCtx.drawImage(webcamEl, 0, 0, 224, 224);

  let predictions;
  try {
    predictions = await model.predict(predCanvas);
  } catch(e) {
    console.error('[Detection] Predict error:', e);
    return;
  }

  frameCount++;

  if (!barsBuilt) {
    buildBars(predictions);
    barsBuilt = true;
  }

  // FPS (exponential moving average)
  const now = performance.now();
  const dt  = (now - lastFrameTime) / 1000;
  lastFrameTime = now;
  fpsSmoothed += (1 / dt - fpsSmoothed) * 0.1;
  const fps = Math.round(fpsSmoothed);

  updateTechPanel(predictions, fps);
  updateActionDisplay(predictions);
}

// ================================================================
//  TECH PANEL UPDATE
// ================================================================
function updateTechPanel(predictions, fps) {
  document.getElementById('tpFPS').textContent    = fps;
  document.getElementById('tpFrames').textContent = frameCount;
  document.getElementById('sbFPS').textContent    = fps + ' FPS';

  const sorted = [...predictions].sort((a, b) => b.probability - a.probability);
  const top    = sorted[0];
  document.getElementById('tpTopClass').textContent = top.className;
  document.getElementById('tpConf').textContent     = (top.probability * 100).toFixed(1) + '%';

  predictions.forEach(p => {
    const els = barEls[p.className];
    if (!els) return;
    const pct = p.probability * 100;
    els.fill.style.width  = pct.toFixed(1) + '%';
    els.pct.textContent   = pct.toFixed(0) + '%';
    els.pct.className     = 'tp-bar-pct' + (pct >= 70 ? ' high' : '');
    els.lbl.className     = 'tp-bar-label' + (p.className === top.className ? ' top-class' : '');
  });
}

// ================================================================
//  ACTION DISPLAY UPDATE
// ================================================================
function updateActionDisplay(predictions) {
  const sorted = [...predictions].sort((a, b) => b.probability - a.probability);
  const top    = sorted[0];
  const map    = LABEL_MAP[top.className];
  const conf   = top.probability;

  if (!map || conf < CONFIDENCE_THRESHOLD) {
    if (currentAction !== null) {
      currentAction = null;
      adDisplay.className  = '';
      adPlayer.style.display = 'none';
      adRole.style.display   = 'none';
      adAction.style.display = 'none';
      adConf.style.display   = 'none';
      setAdState('SCANNING');
    }
    return;
  }

  const actionKey = map.player + '|' + map.action;
  if (currentAction !== actionKey) {
    currentAction = actionKey;

    adDisplay.className = '';
    void adDisplay.offsetWidth; // force reflow to restart CSS animation
    adDisplay.classList.add('triggered-' + map.player.toLowerCase());

    adState.style.display  = 'none';
    adPlayer.style.display = 'block';
    adRole.style.display   = 'block';
    adAction.style.display = 'block';
    adConf.style.display   = 'block';

    adPlayer.textContent   = 'PLAYER ' + map.player;
    adPlayer.style.color   = map.color;
    adRole.textContent     = map.role;
    adAction.textContent   = map.action;
    adAction.style.color   = map.color;

    document.getElementById('sbPlayer').textContent = 'PLAYER: ' + map.player + ' / ' + map.role;
    document.getElementById('sbAction').textContent = 'ACTION: ' + map.action;
  }

  adConf.textContent = (conf * 100).toFixed(1) + '% CONFIDENCE';
}

// ================================================================
//  HELPERS
// ================================================================
function setAdState(msg) {
  adState.style.display = 'block';
  const dot = document.getElementById('scanDot');
  const scanning = (msg === 'SCANNING');
  dot.style.display = scanning ? 'inline-block' : 'none';
  adState.textContent = msg;
  if (scanning) adState.appendChild(dot);
}

// ================================================================
//  BOOT — load model, then camera starts automatically
// ================================================================
setAdState('LOADING MODEL');
loadModel();
</script>
</body>
</html>
